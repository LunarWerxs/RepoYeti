name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  daemon:
    name: daemon (test + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  web:
    name: web (i18n + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run i18n:check # fail on untranslated strings / missing keys / locale parity drift
      - run: bun run build # vue-tsc type-check + production bundle (re-runs i18n:check)
