# Cloudflare Worker config for the RepoYeti relay. See README.md in this directory.
#
# Plain JS, no build step and no bundler: this service is ~150 lines whose entire appeal is being
# boring and never needing attention. Adding a toolchain would be the most likely source of future
# breakage in something that otherwise has none.

account_id = "36d7c731fd0352ef08ea7e46d2d20793"
# `repoyeti` (not `repoyeti-relay`) so the free fallback hostname is the clean
# repoyeti.lunawerx.workers.dev rather than repoyeti-relay.lunawerx.workers.dev.
name = "repoyeti"
main = "worker.js"
compatibility_date = "2026-01-01"
# workers.dev on → the free fallback hostname repoyeti.lunawerx.workers.dev, same Worker + KV as
# the app.repoyeti.com and legacy go.repoyeti.com custom domains.
workers_dev = true

# The public stable address. app.repoyeti.com already has a proxied DNS record, so the Worker runs
# as its origin route. go.repoyeti.com remains the Worker-managed custom domain for old links.
# The zone (repoyeti.com) is on the account above. Self-hosting? Use either model Cloudflare
# documents for your hostname, then `wrangler deploy`.
routes = [
  { pattern = "app.repoyeti.com/*", zone_name = "repoyeti.com" },
  # Keep already-issued v0.11/v0.12 links alive while app.repoyeti.com becomes the default.
  { pattern = "go.repoyeti.com", custom_domain = true }
]

# id -> { publicKey, origin, updatedAt }. Collaboration presence travels directly between the two
# RepoYeti daemons, so it does not consume KV writes here.
#   wrangler kv namespace create RELAY
[[kv_namespaces]]
binding = "RELAY"
id = "32a5ba4b757c4bbf83edbf2f467eb960"
